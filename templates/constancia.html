<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generar constancia - Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h3 class="text-center">📄 Generar Constancia (Admin)</h3>
                    </div>
                    <div class="card-body">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }}">{{ message }}</div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        <form method="POST">
                            <div class="mb-3">
                                <label for="email" class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="conferencia_id" class="form-label">Selecciona la conferencia</label>
                                <select class="form-select" id="conferencia_id" name="conferencia_id" required>
                                    {% for conf in conferencias %}
                                    <option value="{{ conf.id }}">
                                        {{ conf.fecha_mostrar }} - {{ conf.hora }}: {{ conf.titulo[:60] }}{% if conf.titulo|length > 60 %}…{% endif %}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Descargar constancia (PDF)</button>
                        </form>
                        <hr>
                        <div class="text-center">
                            <a href="{{ url_for('constancia_qr') }}" class="btn btn-outline-success">
                                📥 ¿Eres asistente? Descarga tu constancia aquí
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
